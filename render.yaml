# Northeast Gem Geek — Web Service on Render (Node, not Bun)
services:
  - type: web
    name: northeast-gem-geek
    runtime: node
    plan: free
    region: oregon
    # Must produce dist/server.cjs — do not use Bun-only install
    buildCommand: npm install && npm run build && test -f dist/server.cjs && ls -la dist/
    startCommand: node dist/server.cjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
